version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habit-kingdom-api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=5000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET:-}
      - SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.25"
          memory: "128M"

  # PostgreSQL (optional — for production replace with managed DB)
  db:
    image: postgres:16-alpine
    container_name: habit-kingdom-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: habit_kingdom
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d habit_kingdom"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
