name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'assets/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Lint
        run: npx eslint . --ext .ts,.tsx --max-warnings=0
        continue-on-error: true

      - name: Unit tests
        run: npx vitest run --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Dependency vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Expo bundle
        run: npx expo export:embed --platform android --dev false --entry-file node_modules/expo-router/entry.js --bundle-output /tmp/bundle.js --assets-dest /tmp/assets
        continue-on-error: true

      - name: Build server (TypeScript compile)
        run: npx tsc --project server/tsconfig.json --noEmit
        continue-on-error: true

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: env.GHCR_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push image
        if: env.GHCR_TOKEN != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/habit-kingdom-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger host deploy webhook
        if: env.DEPLOY_WEBHOOK != ''
        run: |
          curl -fsS -X POST "$DEPLOY_WEBHOOK" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main","image":"ghcr.io/${{ github.repository_owner }}/habit-kingdom-backend:latest"}'
        env:
          DEPLOY_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK }}

      - name: Deploy skipped (no secrets configured)
        if: env.GHCR_TOKEN == '' && env.DEPLOY_WEBHOOK == ''
        run: echo "Set GHCR_TOKEN and (optionally) DEPLOY_WEBHOOK + DEPLOY_WEBHOOK_TOKEN in repo secrets to enable auto-deploy."
